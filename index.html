<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ Kitchen Appliances | Premium Kitchen Gallery - Ravet, Pune</title>
    <meta name="description"
        content="JJ Kitchen Appliances - Authorized Glen Gallery in Ravet, Pune. Premium Kitchen Chimneys, Hobs, and Appliances. Experience the modern kitchen.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        :root {
            /* â”€â”€ Antigravity Obsidian Palette â”€â”€ */
            --bg-deep: #0A0A0B;
            --bg: #0E0E10;
            --bg-2: #141416;
            --bg-3: #1A1A1E;
            --bg-card: rgba(20, 20, 24, 0.65);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --bg-glass-2: rgba(255, 255, 255, 0.06);
            --surface: rgba(30, 30, 32, 0.70);
            --surface-2: #28282E;

            /* Cyber Gold + Platinum accents */
            --gold: #FFB800;
            --gold-2: #FFCC40;
            --gold-3: #FFD866;
            --gold-dim: rgba(255, 184, 0, 0.08);
            --gold-dim-2: rgba(255, 184, 0, 0.14);
            --gold-bdr: rgba(255, 184, 0, 0.25);
            --gold-glow: 0 0 40px rgba(255, 184, 0, 0.15), 0 0 80px rgba(255, 184, 0, 0.05);
            --platinum: #E2E2E2;

            /* Text */
            --white: #F0EFED;
            --white-2: #D8D6D0;
            --muted: #8A8896;
            --faint: #56545F;
            --ink: #F0EFED;

            /* Borders */
            --border: rgba(255, 255, 255, 0.05);
            --border-2: rgba(255, 255, 255, 0.08);
            --border-3: rgba(255, 255, 255, 0.12);
            --neon-bdr: rgba(255, 184, 0, 0.30);

            /* Luminous Shadows */
            --sh-xs: 0 1px 4px rgba(0, 0, 0, 0.2), 0 0 8px rgba(255, 184, 0, 0.03);
            --sh-sm: 0 4px 20px rgba(0, 0, 0, 0.25), 0 0 16px rgba(255, 184, 0, 0.04);
            --sh: 0 12px 48px rgba(0, 0, 0, 0.35), 0 0 32px rgba(255, 184, 0, 0.06);
            --sh-lg: 0 24px 80px rgba(0, 0, 0, 0.40), 0 0 60px rgba(255, 184, 0, 0.08);
            --sh-xl: 0 40px 120px rgba(0, 0, 0, 0.50), 0 0 80px rgba(255, 184, 0, 0.10);

            /* Radii */
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        *,
        *::before,
        *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .mono { font-family: 'Inter', sans-serif; }

        /* â”€â”€ Responsive utilities â”€â”€ */
        .hidden { display: none !important; }
        @media (min-width: 768px) {
            .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr) !important; }
        }
        @media (min-width: 1024px) {
            .lg\:flex { display: flex !important; }
            .lg\:hidden { display: none !important; }
            .lg\:grid-cols-2 { grid-template-columns: repeat(2, 1fr) !important; }
            .lg\:grid-cols-3 { grid-template-columns: repeat(3, 1fr) !important; }
            .lg\:grid-cols-4 { grid-template-columns: repeat(4, 1fr) !important; }
            .lg\:grid-cols-12 { grid-template-columns: repeat(12, 1fr) !important; }
            .lg\:col-span-2 { grid-column: span 2 !important; }
            .lg\:col-span-4 { grid-column: span 4 !important; }
            .lg\:col-span-8 { grid-column: span 8 !important; }
        }
        @media (max-width: 767px) {
            .md\:hidden { display: none !important; }
        }

        /* â”€â”€ Animated mesh gradient background (Antigravity) â”€â”€ */
        @keyframes meshMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mesh-bg {
            background: linear-gradient(-45deg,
                    rgba(255, 184, 0, 0.04),
                    rgba(100, 60, 200, 0.03),
                    rgba(255, 184, 0, 0.03),
                    rgba(60, 120, 240, 0.02));
            background-size: 400% 400%;
            animation: meshMove 22s ease infinite;
        }

        /* â”€â”€ Grain texture overlay â”€â”€ */
        .grain::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.35;
        }

        /* â”€â”€ Glass card (Antigravity) â”€â”€ */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .glass-card:hover {
            border-color: var(--neon-bdr);
            box-shadow: var(--sh), var(--gold-glow);
            transform: translateY(-6px);
        }

        /* â”€â”€ Cards â”€â”€ */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card:hover {
            border-color: var(--neon-bdr);
            box-shadow: var(--sh), var(--gold-glow);
            transform: translateY(-7px);
        }

        /* â”€â”€ Gold shimmer text â”€â”€ */
        @keyframes shimmer {
            0% { background-position: -300% center; }
            100% { background-position: 300% center; }
        }

        .gold-text {
            background: linear-gradient(90deg, #CC9200, #FFB800 25%, #FFD866 50%, #FFB800 75%, #CC9200);
            background-size: 400% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }

        /* â”€â”€ Antigravity Float animations â”€â”€ */
        @keyframes floatY {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-14px) rotate(0.3deg); }
            66% { transform: translateY(-7px) rotate(-0.3deg); }
        }

        @keyframes floatY2 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.5deg); }
        }

        @keyframes antigravFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .float { animation: floatY 7s ease-in-out infinite; }
        .float2 { animation: floatY2 11s ease-in-out infinite; animation-delay: -5s; }
        .antigrav-float { animation: antigravFloat 6s ease-in-out infinite; }

        /* â”€â”€ Entrance animations â”€â”€ */
        @keyframes revUp {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes revLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .rev { animation: revUp 1s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .rev-d1 { animation-delay: 0.10s; }
        .rev-d2 { animation-delay: 0.22s; }
        .rev-d3 { animation-delay: 0.34s; }
        .rev-d4 { animation-delay: 0.48s; }

        /* â”€â”€ Stagger children â”€â”€ */
        .stg>*:nth-child(1) { animation: revUp .85s .04s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .stg>*:nth-child(2) { animation: revUp .85s .12s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .stg>*:nth-child(3) { animation: revUp .85s .20s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .stg>*:nth-child(4) { animation: revUp .85s .28s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .stg>*:nth-child(5) { animation: revUp .85s .36s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .stg>*:nth-child(6) { animation: revUp .85s .44s cubic-bezier(0.19, 1, 0.22, 1) both; }

        /* â”€â”€ Primary Cyber Gold button â”€â”€ */
        .btn-g {
            background: linear-gradient(135deg, #E5A600 0%, #FFB800 50%, #FFCC40 100%);
            color: #0A0A0B;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            letter-spacing: 0.06em;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 10;
            pointer-events: auto;
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.22s;
            text-decoration: none;
        }

        .btn-g::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FFCC40 0%, #FFD866 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-g:hover::before { opacity: 1; }

        .btn-g>* { position: relative; z-index: 1; }
        .btn-g span, .btn-g svg { position: relative; z-index: 1; }

        .btn-g:hover {
            box-shadow: 0 10px 40px rgba(255, 184, 0, 0.45), 0 0 20px rgba(255, 184, 0, 0.25), 0 2px 8px rgba(255, 184, 0, 0.3);
            transform: translateY(-3px) scale(1.02);
        }

        .btn-g:active {
            transform: translateY(0) scale(1);
            box-shadow: 0 4px 16px rgba(255, 184, 0, 0.30);
        }

        /* â”€â”€ Ghost button â”€â”€ */
        .btn-wh {
            background: transparent;
            color: var(--white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-3);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 10;
            pointer-events: auto;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-wh:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
            box-shadow: 0 6px 24px rgba(255, 184, 0, 0.15), 0 0 16px rgba(255, 184, 0, 0.08), inset 0 0 20px rgba(255, 184, 0, 0.04);
            transform: translateY(-2px);
        }

        /* â”€â”€ Tag / badge â”€â”€ */
        .tag {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.20em;
            text-transform: uppercase;
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid var(--neon-bdr);
            padding: 6px 14px;
            border-radius: 6px;
            display: inline-block;
            position: relative;
        }

        /* â”€â”€ Form inputs â”€â”€ */
        .inp {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border-2);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
            width: 100%;
        }

        .inp:hover {
            border-color: var(--border-3);
            background: rgba(255, 255, 255, 0.05);
        }

        .inp:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(255, 184, 0, 0.10), 0 0 20px rgba(255, 184, 0, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }

        .inp::placeholder { color: var(--faint); font-style: normal; }
        select.inp { appearance: none; }

        /* â”€â”€ Gold divider â”€â”€ */
        .gold-rule {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 184, 0, 0.30) 30%, rgba(255, 204, 64, 0.45) 50%, rgba(255, 184, 0, 0.30) 70%, transparent);
        }

        /* â”€â”€ Pulse dot â”€â”€ */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.50); }
            70% { box-shadow: 0 0 0 10px rgba(255, 184, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); }
        }

        .pulse-g { animation: pulse-ring 2.4s ease-out infinite; }

        /* â”€â”€ Category cards â”€â”€ */
        .cat-img {
            transition: transform 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .cat-wrap:hover .cat-img { transform: scale(1.10); }

        /* â”€â”€ Shimmer on category card hover â”€â”€ */
        @keyframes shimmerMove {
            from { left: -120%; }
            to { left: 160%; }
        }

        .cat-wrap::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.06) 50%, transparent 60%);
            pointer-events: none;
        }

        .cat-wrap:hover::after { animation: shimmerMove 0.8s ease forwards; }

        /* â”€â”€ Product card accent bar â”€â”€ */
        .prod-card { position: relative; }

        .prod-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-3));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 0 0 2px 2px;
            box-shadow: 0 0 12px rgba(255, 184, 0, 0.3);
        }

        .prod-card:hover .prod-bar { transform: scaleX(1); }

        /* â”€â”€ Underline hover â”€â”€ */
        .ulh {
            position: relative;
            display: inline-block;
        }

        .ulh::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, var(--gold), var(--gold-2));
            transition: width 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 1px;
            box-shadow: 0 0 6px rgba(255, 184, 0, 0.3);
        }

        .ulh:hover::after { width: 100%; }

        /* â”€â”€ Scrollbar â”€â”€ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
        ::selection { background: var(--gold); color: var(--bg); }

        /* â”€â”€ Map filter â”€â”€ */
        .map-warm { filter: brightness(0.65) contrast(1.1) saturate(0.7) hue-rotate(10deg); }

        /* â”€â”€ FAQ â”€â”€ */
        .faq-ans {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94), padding 0.3s ease;
        }
        .faq-ans.open { max-height: 250px; }

        /* â”€â”€ Neon glow utilities â”€â”€ */
        .glow-gold {
            box-shadow: 0 0 0 1px var(--neon-bdr), 0 0 24px rgba(255, 184, 0, 0.10), 0 8px 40px rgba(255, 184, 0, 0.06);
        }

        .glow-gold:hover {
            box-shadow: 0 0 0 1px var(--gold), 0 0 40px rgba(255, 184, 0, 0.20), 0 16px 56px rgba(255, 184, 0, 0.12);
        }

        /* â”€â”€ Neon border glow on hover â”€â”€ */
        @keyframes neonPulse {
            0%, 100% { border-color: rgba(255, 184, 0, 0.15); box-shadow: 0 0 8px rgba(255, 184, 0, 0.05); }
            50% { border-color: rgba(255, 184, 0, 0.40); box-shadow: 0 0 24px rgba(255, 184, 0, 0.12); }
        }

        .neon-hover:hover {
            animation: neonPulse 2s ease-in-out infinite;
        }

        /* â”€â”€ Icon badges â”€â”€ */
        .icon-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(255, 184, 0, 0.06);
            border: 1px solid var(--neon-bdr);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            flex-shrink: 0;
            transition: all 0.35s ease;
        }

        .icon-badge:hover,
        *:hover>.icon-badge {
            background: rgba(255, 184, 0, 0.12);
            box-shadow: 0 0 0 4px rgba(255, 184, 0, 0.08), 0 0 28px rgba(255, 184, 0, 0.15);
            transform: scale(1.1) rotate(-5deg);
        }

        /* â”€â”€ Section labels â”€â”€ */
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            height: 1px;
            width: 28px;
            background: linear-gradient(90deg, var(--neon-bdr), transparent);
        }

        .section-label::before {
            background: linear-gradient(270deg, var(--neon-bdr), transparent);
        }

        /* â”€â”€ Stats hover â”€â”€ */
        .stat-cell {
            transition: background 0.28s ease, box-shadow 0.28s;
        }

        .stat-cell:hover {
            background: rgba(255, 255, 255, 0.03) !important;
            box-shadow: inset 0 -3px 0 var(--gold), 0 0 16px rgba(255, 184, 0, 0.06);
        }

        /* â”€â”€ Reason cards â”€â”€ */
        .reason-card { transition: all 0.35s ease; }

        .reason-card:hover {
            background: rgba(255, 255, 255, 0.04) !important;
            transform: translateY(-5px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.30), 0 0 24px rgba(255, 184, 0, 0.08), inset 0 0 0 1px var(--neon-bdr);
        }

        /* â”€â”€ Spin â”€â”€ */
        @keyframes spin { to { transform: rotate(360deg); } }

        /* â”€â”€ Gradient text â”€â”€ */
        .text-gradient {
            background: linear-gradient(135deg, var(--gold) 20%, var(--gold-3) 80%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* â”€â”€ Offer card â”€â”€ */
        .offer-card { cursor: pointer; }

        .offer-card .offer-discount-badge {
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .offer-card:hover .offer-discount-badge { transform: scale(1.08) rotate(-3deg); }

        /* â”€â”€ Hero offers badge â”€â”€ */
        .hero-offers-badge:hover {
            background: rgba(255, 184, 0, 0.10) !important;
            border-color: var(--gold) !important;
            box-shadow: 0 4px 24px rgba(255, 184, 0, 0.15), 0 0 16px rgba(255, 184, 0, 0.08);
            transform: translateY(-2px);
        }

        /* â”€â”€ Stat hover cell â”€â”€ */
        .stat-hover-cell:hover {
            background: rgba(255, 184, 0, 0.05);
        }

        /* â”€â”€ Mobile nav â”€â”€ */
        .mobile-nav-overlay a:hover { color: var(--gold) !important; }

        /* â”€â”€ Ambient orbs (Bokeh) â”€â”€ */
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, -20px) scale(0.95); }
            75% { transform: translate(10px, 30px) scale(1.02); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-gold { background: radial-gradient(circle, rgba(255, 184, 0, 0.12) 0%, transparent 70%); }
        .orb-purple { background: radial-gradient(circle, rgba(120, 80, 220, 0.06) 0%, transparent 70%); }
        .orb-blue { background: radial-gradient(circle, rgba(60, 140, 255, 0.04) 0%, transparent 70%); }
        .orb-amber { background: radial-gradient(circle, rgba(255, 140, 0, 0.08) 0%, transparent 70%); }

        /* â”€â”€ Glowing border animation â”€â”€ */
        @keyframes borderGlow {
            0%, 100% { border-color: rgba(255, 184, 0, 0.12); }
            50% { border-color: rgba(255, 184, 0, 0.30); }
        }

        .glow-border-pulse { animation: borderGlow 3s ease-in-out infinite; }

        /* â”€â”€ Section separator â”€â”€ */
        .section-sep {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-2) 20%, var(--neon-bdr) 50%, var(--border-2) 80%, transparent);
        }

        /* Premium JJ Kitchen Appliances design system */
        :root {
            --color-primary: #1A1A1A;
            --color-accent: #C9922A;
            --color-accent-2: #E8B84B;
            --color-background: #FAFAF8;
            --color-surface: #FFFFFF;
            --color-border: #E8E4DC;
            --color-muted: #69645C;

            --bg-deep: #FAFAF8;
            --bg: #FAFAF8;
            --bg-2: #F5F2EC;
            --bg-3: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-glass: rgba(255, 255, 255, 0.82);
            --bg-glass-2: rgba(255, 255, 255, 0.92);
            --surface: #FFFFFF;
            --surface-2: #F3EFE8;

            --gold: #C9922A;
            --gold-2: #E8B84B;
            --gold-3: #F1CA68;
            --gold-dim: rgba(201, 146, 42, 0.10);
            --gold-dim-2: rgba(201, 146, 42, 0.16);
            --gold-bdr: rgba(201, 146, 42, 0.28);
            --gold-glow: 0 10px 28px rgba(201, 146, 42, 0.16);
            --platinum: #FAFAF8;

            --white: #1A1A1A;
            --white-2: #3B3832;
            --muted: #69645C;
            --faint: #938B7F;
            --ink: #1A1A1A;

            --border: #E8E4DC;
            --border-2: #E8E4DC;
            --border-3: #D9D2C6;
            --neon-bdr: rgba(201, 146, 42, 0.34);

            --sh-xs: 0 1px 6px rgba(0, 0, 0, 0.05);
            --sh-sm: 0 4px 24px rgba(0, 0, 0, 0.07);
            --sh: 0 4px 24px rgba(0, 0, 0, 0.07);
            --sh-lg: 0 18px 42px rgba(0, 0, 0, 0.10);
            --sh-xl: 0 24px 64px rgba(0, 0, 0, 0.12);

            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-background);
            color: var(--color-primary);
        }

        * { letter-spacing: 0 !important; }

        body.grain::after,
        .orb { display: none !important; }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .mono { font-family: 'Inter', sans-serif; }

        section {
            padding-top: 80px !important;
            padding-bottom: 80px !important;
        }

        .mesh-bg {
            background:
                linear-gradient(135deg, rgba(250, 250, 248, 0.94), rgba(245, 242, 236, 0.94)),
                radial-gradient(circle at 78% 18%, rgba(201, 146, 42, 0.11), transparent 32%);
            animation: none;
        }

        .glass-card,
        .card,
        .offer-card {
            background: var(--color-surface) !important;
            border: 1px solid var(--color-border) !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        .glass-card:hover,
        .card:hover,
        .offer-card:hover {
            border-color: rgba(201, 146, 42, 0.42) !important;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.10) !important;
        }

        .gold-text,
        .text-gradient {
            background: linear-gradient(135deg, #C9922A, #E8B84B);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: none;
        }

        .btn-g,
        .btn-wh {
            min-height: 48px;
            border-radius: 50px;
            padding: 14px 32px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            letter-spacing: 0;
        }

        .btn-g {
            background: linear-gradient(135deg, #C9922A, #E8B84B);
            color: #1A1A1A;
            box-shadow: 0 8px 20px rgba(201, 146, 42, 0.22);
        }

        .btn-g::before { display: none; }

        .btn-g:hover {
            box-shadow: 0 12px 26px rgba(201, 146, 42, 0.30);
            transform: translateY(-2px);
        }

        .btn-wh {
            background: #FFFFFF;
            color: #1A1A1A;
            border: 1px solid #E8E4DC;
        }

        .btn-wh:hover {
            border-color: #C9922A;
            color: #1A1A1A;
            background: #FFF9EC;
            box-shadow: 0 4px 18px rgba(201, 146, 42, 0.14);
            transform: translateY(-2px);
        }

        .tag {
            font-family: 'Inter', sans-serif;
            color: #9A6814;
            background: rgba(201, 146, 42, 0.10);
            border: 1px solid rgba(201, 146, 42, 0.25);
            border-radius: 999px;
            padding: 8px 14px;
            letter-spacing: 0.10em;
        }

        .inp {
            background: #FFFFFF;
            border: 1px solid #E8E4DC;
            color: #1A1A1A;
            font-family: 'Inter', sans-serif;
            border-radius: 12px;
        }

        .inp:hover,
        .inp:focus {
            border-color: #C9922A;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(201, 146, 42, 0.12);
        }

        .map-warm { filter: saturate(0.9) contrast(0.96) brightness(1.04); }

        ::-webkit-scrollbar-track { background: #FAFAF8; }
        ::-webkit-scrollbar-thumb { background: #D9D2C6; }
        ::selection { background: #C9922A; color: #1A1A1A; }

        @media (max-width: 767px) {
            section {
                padding-top: 48px !important;
                padding-bottom: 48px !important;
            }
        }
    </style>
</head>
